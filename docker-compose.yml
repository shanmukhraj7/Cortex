services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: cortex
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: shannu2612
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cortex"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────────────────
  # Required by notes-service for: single-note cache (TTL 10 min)
  # and Bucket4j-backed rate limiting in api-gateway.
  redis:
    image: redis:7-alpine
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  auth-service:
    build: ./auth-service
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/cortex
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: shannu2612
      JWT_SECRET: cortex-dev-secret-key-change-me-please-32
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  notes-service:
    build: ./notes-service
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/cortex
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: shannu2612
      ML_SERVICE_URL: http://ml-service:8001
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ml-service:
        condition: service_healthy
    ports:
      - "8082:8082"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8082/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s

  ml-service:
    build: ./ml-service
    environment:
      DATABASE_URL: postgres://postgres:shannu2612@postgres:5432/cortex
      DEVICE: cpu
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8001:8001"
    volumes:
      - ml-model-cache:/app/model_cache
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s   # model download on first run

  api-gateway:
    build: ./api-gateway
    environment:
      JWT_SECRET: cortex-dev-secret-key-change-me-please-32
      AUTH_SERVICE_URL: http://auth-service:8081
      NOTES_SERVICE_URL: http://notes-service:8082
    depends_on:
      auth-service:
        condition: service_healthy
      notes-service:
        condition: service_healthy
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    environment:
      VITE_API_URL: http://localhost:8080
    depends_on:
      - api-gateway
    ports:
      - "5173:5173"

volumes:
  postgres-data:
  redis-data:
  ml-model-cache:
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  java-auth:
    name: Auth Service Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '21', distribution: temurin, cache: maven }
      - run: cd auth-service && ./mvnw -q test

  java-notes:
    name: Notes Service Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '21', distribution: temurin, cache: maven }
      - run: cd notes-service && ./mvnw -q test

  java-gateway:
    name: Gateway Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '21', distribution: temurin, cache: maven }
      - run: cd api-gateway && ./mvnw -q test

  python-tests:
    name: ML Service Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: |
          cd ml-service
          pip install -r requirements-cpu.txt
          pip install torch==2.6.0+cpu --index-url https://download.pytorch.org/whl/cpu
          pytest tests/ -v

  docker-build:
    name: Docker Build Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          docker build -t cortex-auth:ci    ./auth-service
          docker build -t cortex-notes:ci   ./notes-service
          docker build -t cortex-gateway:ci ./api-gateway
          docker build -t cortex-ml:ci      ./ml-service
          docker build -t cortex-frontend:ci ./frontend
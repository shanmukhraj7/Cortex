server:
  port: 8082

spring:
  application:
    name: notes-service
  
  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${POSTGRES_DB:cortex}
    username: ${POSTGRES_USER:cortex}
    password: ${POSTGRES_PASSWORD:cortex}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true

  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}

app:
  ml-service:
    url: ${ML_SERVICE_URL:http://localhost:8001}

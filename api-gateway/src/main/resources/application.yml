server:
  port: ${PORT:8080}

spring:
  application:
    name: api-gateway
  data:
    redis:
      url: ${REDIS_URL:redis://redis:6379}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

cortex:
  jwt:
    secret: ${JWT_SECRET:cortex-dev-secret-key-change-me-please-32}
  services:
    auth-url: ${AUTH_SERVICE_URL:http://localhost:8081}
    notes-url: ${NOTES_SERVICE_URL:http://localhost:8082}
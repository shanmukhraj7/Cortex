server:
  port: ${PORT:8081}

spring:
  application:
    name: auth-service
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/cortex}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:shannu2612}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    table: flyway_auth_history
    baseline-on-migrate: true
    baseline-version: 0

cortex:
  jwt:
    secret: ${JWT_SECRET:cortex-dev-secret-key-change-me-please-32}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:1440}
